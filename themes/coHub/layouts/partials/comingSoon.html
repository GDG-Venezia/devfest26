{{ with .Site.Data.comingSoon }}
{{ if .enable }}
<section class="coming-soon" id="program">
  <div class="container">
    <div class="coming-soon-content" data-aos="fade-up">
      <p class="coming-soon-eyebrow">{{ .eyebrow }}</p>
      <h2>{{ .title }}</h2>
      <p>{{ .subtitle }}</p>
    </div>
  </div>
</section>
{{ end }}
{{ end }}
