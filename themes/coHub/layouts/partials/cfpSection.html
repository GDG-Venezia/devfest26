{{ with .Site.Data.cfp }}
{{ if .enable }}
<section class="blog" id="cfp">
  <div class="container">
    <div class="row">
      <div class="col-12">
        <div class="section-title">
          <h2>{{ .title }}</h2>
        </div>
      </div>
    </div>
    <div class="row justify-content-center">
      <p>{{ .subtitle }}</p>
      <div class="col-12 text-center">
        <a href="{{ .buttonTarget }}" class="btn btn-primary" target="_blank" rel="noopener">{{ .buttonLabel }}</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
{{ end }}
